<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>codenprofit — HTML & CSS Fundamentals (Advanced)</title>
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Prism.js for code highlighting -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
  <style>
    :root {
      --bg: #0F172A;
      --bg2: #0a1020;
      --surface: rgba(30,41,59,0.5);
      --surface2: rgba(30,41,59,0.8);
      --border: rgba(255,255,255,0.07);
      --border-h: rgba(59,130,246,0.35);
      --accent: #3B82F6;
      --accent2: #8B5CF6;
      --grad: linear-gradient(135deg, #3B82F6, #8B5CF6);
      --green: #10b981;
      --red: #ef4444;
      --amber: #f59e0b;
      --text: #ffffff;
      --text-secondary: #e2e8f0;
      --muted: rgba(255,255,255,0.7);
      --muted2: rgba(255,255,255,0.3);
      --nav-h: 80px;
      
      --font-mono: 'Fira Code', 'Courier New', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* Background Effects */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background: 
        radial-gradient(ellipse 80% 70% at 10% 20%, rgba(59,130,246,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 70% 60% at 90% 80%, rgba(139,92,246,0.15) 0%, transparent 60%);
    }

    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at 50% 50%, black 30%, transparent 80%);
    }

    /* Navigation */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      background: rgba(15,23,42,0.85);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-img {
      height: 45px;
      width: 45px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid rgba(59,130,246,0.3);
    }

    .logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(90deg, #ffffff 0%, var(--accent) 50%, var(--accent2) 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: logoShimmer 3s linear infinite;
    }

    @keyframes logoShimmer {
      to { background-position: 200% center; }
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .module-badge {
      padding: 8px 20px;
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: 40px;
      font-size: 14px;
      font-weight: 500;
    }

    .module-badge i {
      color: var(--accent);
      margin-right: 8px;
    }

    .back-link {
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: var(--accent);
    }

    .avatar-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--grad);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      border: 2px solid rgba(59,130,246,0.4);
    }

    .avatar-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Main Container */
    .module-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 30px;
    }

    /* Sidebar - Chapter Navigation */
    .chapter-sidebar {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      height: fit-content;
      position: sticky;
      top: calc(var(--nav-h) + 20px);
      max-height: calc(100vh - 120px);
      overflow-y: auto;
    }

    .sidebar-header {
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-header h3 i {
      color: var(--accent2);
    }

    .sidebar-header p {
      color: var(--muted);
      font-size: 12px;
    }

    .progress-overview {
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 24px;
      text-align: center;
    }

    .progress-circle {
      width: 80px;
      height: 80px;
      margin: 0 auto 12px;
      position: relative;
    }

    .progress-circle svg {
      width: 80px;
      height: 80px;
      transform: rotate(-90deg);
    }

    .progress-circle circle {
      fill: none;
      stroke-width: 4;
      stroke-linecap: round;
    }

    .progress-circle-bg {
      stroke: rgba(255,255,255,0.1);
    }

    .progress-circle-fill {
      stroke: url(#gradient);
      stroke-dasharray: 226.2;
      stroke-dashoffset: 226.2;
      transition: stroke-dashoffset 0.5s;
    }

    .progress-percent {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
    }

    .chapter-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chapter-item {
      padding: 12px 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid transparent;
    }

    .chapter-item:hover {
      background: rgba(59,130,246,0.05);
      border-color: rgba(59,130,246,0.2);
    }

    .chapter-item.active {
      background: rgba(59,130,246,0.1);
      border-color: var(--accent);
    }

    .chapter-item.completed {
      opacity: 0.8;
    }

    .chapter-status {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
    }

    .chapter-status.pending {
      border: 2px solid var(--muted2);
      color: var(--muted2);
    }

    .chapter-status.completed {
      background: var(--green);
      color: white;
    }

    .chapter-info {
      flex: 1;
    }

    .chapter-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 2px;
    }

    .chapter-meta {
      font-size: 11px;
      color: var(--muted);
    }

    /* Main Content */
    .chapter-content {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 40px;
    }

    .chapter-header {
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .chapter-header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chapter-header h1 i {
      color: var(--accent2);
      font-size: 28px;
    }

    .chapter-progress {
      display: flex;
      align-items: center;
      gap: 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .chapter-progress-bar {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .chapter-progress-fill {
      height: 100%;
      background: var(--grad);
      border-radius: 3px;
      transition: width 0.3s;
    }

    /* Content Sections */
    .content-section {
      margin-bottom: 40px;
    }

    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--text);
    }

    .section-subtitle {
      font-size: 20px;
      font-weight: 600;
      margin: 30px 0 15px;
      color: var(--accent2);
    }

    .content-text {
      color: var(--text-secondary);
      font-size: 16px;
      line-height: 1.8;
      margin-bottom: 20px;
    }

    .content-text strong {
      color: var(--accent);
    }

    .content-list {
      margin: 20px 0 20px 30px;
      color: var(--text-secondary);
    }

    .content-list li {
      margin-bottom: 10px;
    }

    .content-list li::marker {
      color: var(--accent2);
    }

    /* Code Blocks */
    .code-block {
      background: #1a1e2c;
      border: 1px solid var(--border);
      border-radius: 16px;
      margin: 20px 0;
      overflow: hidden;
    }

    .code-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: rgba(0,0,0,0.3);
      border-bottom: 1px solid var(--border);
    }

    .code-language {
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .code-copy {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      transition: color 0.2s;
    }

    .code-copy:hover {
      color: var(--accent);
    }

    .code-block pre {
      margin: 0;
      padding: 20px;
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.6;
      overflow-x: auto;
    }

    .code-block code {
      font-family: var(--font-mono);
    }

    /* Info Boxes */
    .info-box {
      background: rgba(59,130,246,0.05);
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: 16px;
      padding: 20px;
      margin: 20px 0;
      display: flex;
      gap: 16px;
    }

    .info-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: rgba(59,130,246,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .info-content h4 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .info-content p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .tip-box {
      background: rgba(16,185,129,0.05);
      border: 1px solid rgba(16,185,129,0.2);
    }

    .tip-box .info-icon {
      background: rgba(16,185,129,0.1);
      color: var(--green);
    }

    .warning-box {
      background: rgba(245,158,11,0.05);
      border: 1px solid rgba(245,158,11,0.2);
    }

    .warning-box .info-icon {
      background: rgba(245,158,11,0.1);
      color: var(--amber);
    }

    /* Table Styles */
    .content-table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
      background: rgba(0,0,0,0.2);
      border-radius: 16px;
      overflow: hidden;
    }

    .content-table th {
      background: rgba(59,130,246,0.1);
      padding: 12px;
      text-align: left;
      font-weight: 600;
      color: var(--accent);
    }

    .content-table td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .content-table tr:last-child td {
      border-bottom: none;
    }

    .content-table td:first-child {
      font-weight: 600;
      color: var(--text);
    }

    /* Image Container */
    .image-container {
      margin: 30px 0;
      text-align: center;
    }

    .image-container img {
      max-width: 100%;
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .image-caption {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
    }

    /* Quiz Section */
    .quiz-section {
      background: rgba(139,92,246,0.05);
      border: 1px solid rgba(139,92,246,0.2);
      border-radius: 24px;
      padding: 30px;
      margin-top: 40px;
    }

    .quiz-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .quiz-icon {
      width: 50px;
      height: 50px;
      border-radius: 16px;
      background: rgba(139,92,246,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: var(--accent2);
    }

    .quiz-header h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 600;
    }

    .quiz-header p {
      color: var(--muted);
      font-size: 13px;
    }

    .quiz-question {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 24px;
      color: var(--text);
    }

    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .quiz-option {
      padding: 16px 20px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 15px;
      color: var(--text-secondary);
    }

    .quiz-option:hover {
      border-color: var(--accent2);
      background: rgba(139,92,246,0.08);
    }

    .quiz-option.selected {
      border-color: var(--accent2);
      background: rgba(139,92,246,0.15);
      color: var(--neon2);
    }

    .quiz-option.correct {
      border-color: var(--green);
      background: rgba(16,185,129,0.1);
      color: var(--green);
    }

    .quiz-option.wrong {
      border-color: var(--red);
      background: rgba(239,68,68,0.08);
      color: var(--red);
    }

    .quiz-feedback {
      margin-top: 20px;
      padding: 20px;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    .quiz-feedback.correct {
      border-color: var(--green);
    }

    .quiz-feedback.wrong {
      border-color: var(--red);
    }

    .feedback-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .feedback-title i {
      font-size: 16px;
    }

    .feedback-text {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .quiz-actions {
      display: flex;
      gap: 16px;
      margin-top: 24px;
    }

    .btn-primary {
      padding: 14px 28px;
      background: var(--grad);
      border: none;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(59,130,246,0.4);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      padding: 14px 28px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 40px;
      color: var(--text);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      background: rgba(59,130,246,0.1);
    }

    /* Navigation Buttons */
    .chapter-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    /* Final Quiz Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(12px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: rgba(15,23,42,0.4);
      backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 40px;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .modal h2 i {
      color: var(--amber);
    }

    .completion-badge {
      text-align: center;
      padding: 30px;
      background: linear-gradient(135deg, rgba(245,158,11,0.1), rgba(139,92,246,0.1));
      border-radius: 24px;
      margin: 24px 0;
    }

    .completion-badge i {
      font-size: 64px;
      color: var(--amber);
      margin-bottom: 16px;
    }

    .completion-badge h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--amber);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 2000;
      background: rgba(30,41,59,0.4);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(59,130,246,0.5);
      color: #fff;
      padding: 14px 24px;
      border-radius: 16px;
      font-size: 14px;
      font-weight: 500;
      display: none;
      animation: toastIn 0.3s ease;
    }

    @keyframes toastIn {
      from { transform: translateY(24px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .module-container {
        grid-template-columns: 1fr;
      }
      
      .chapter-sidebar {
        position: static;
        max-height: none;
      }
    }

    @media (max-width: 768px) {
      nav {
        padding: 0 20px;
      }
      
      .module-badge {
        display: none;
      }
      
      .chapter-content {
        padding: 24px;
      }
      
      .chapter-header h1 {
        font-size: 24px;
      }
      
      .quiz-actions {
        flex-direction: column;
      }
      
      .chapter-nav {
        flex-direction: column;
        gap: 12px;
      }
      
      .chapter-nav button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="grid-overlay"></div>

  <!-- Navigation -->
  <nav>
    <a href="dev.html" class="logo">
      <img src="logo.png" alt="codenprofit" class="logo-img">
      <span class="logo-text">CodeNProfit</span>
    </a>

    <div class="nav-right">
      <div class="module-badge">
        <i class="fas fa-code"></i> HTML & CSS Fundamentals
      </div>
      <a href="dev.html#learn" class="back-link">
        <i class="fas fa-arrow-left"></i> Back to Learning Path
      </a>
      <div class="avatar-btn">
        <img src="https://static.vecteezy.com/system/resources/thumbnails/059/919/145/small/impressive-artistic-happy-graduate-in-cap-and-gown-professional-png.png" alt="avatar">
      </div>
    </div>
  </nav>

  <!-- Main Module Container -->
  <div class="module-container">
    <!-- Sidebar - Chapter Navigation -->
    <div class="chapter-sidebar">
      <div class="sidebar-header">
        <h3><i class="fas fa-book-open"></i> Course Content</h3>
        <p>HTML & CSS Fundamentals • 8 chapters</p>
      </div>

      <div class="progress-overview">
        <div class="progress-circle" id="progressCircle">
          <svg viewBox="0 0 40 40">
            <defs>
              <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#3B82F6" />
                <stop offset="100%" stop-color="#8B5CF6" />
              </linearGradient>
            </defs>
            <circle class="progress-circle-bg" cx="20" cy="20" r="18" />
            <circle class="progress-circle-fill" cx="20" cy="20" r="18" style="stroke-dashoffset: 226.2;" />
          </svg>
          <div class="progress-percent" id="progressPercent">0%</div>
        </div>
        <div style="font-size: 12px; color: var(--muted);">Chapter Progress</div>
      </div>

      <div class="chapter-list" id="chapterList">
        <!-- Chapters will be populated by JavaScript -->
      </div>
    </div>

    <!-- Main Content Area -->
    <div class="chapter-content" id="chapterContent">
      <!-- Chapter content will be loaded here by JavaScript -->
    </div>
  </div>

  <!-- Final Quiz Modal -->
  <div class="modal-overlay" id="finalQuizModal">
    <div class="modal" id="finalQuizContent">
      <!-- Final quiz will be loaded here -->
    </div>
  </div>

  <!-- Completion Modal -->
  <div class="modal-overlay" id="completionModal">
    <div class="modal">
      <h2><i class="fas fa-trophy"></i> Congratulations!</h2>
      <div class="completion-badge">
        <i class="fas fa-certificate"></i>
        <h3>HTML & CSS Fundamentals</h3>
        <p style="color: var(--muted);">You've earned the Web Foundations Badge!</p>
      </div>
      <p style="text-align: center; margin-bottom: 24px;">You've successfully completed all chapters and passed the final assessment.</p>
      <div style="display: flex; gap: 16px; justify-content: center;">
        <button class="btn-secondary" onclick="closeCompletionModal()">
          <i class="fas fa-times"></i> Close
        </button>
        <button class="btn-primary" onclick="returnToLearningPath()">
          <i class="fas fa-arrow-right"></i> Continue Learning
        </button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Prism.js for code highlighting -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <!-- Firebase SDK (COMPAT VERSION — IMPORTANT) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<!-- Your Firebase Config -->
<script src="firebase-config.js?v=2"></script>

  <script>
// ==================== GLOBAL VARIABLES ====================
let currentChapterIndex = 0;
let chapterProgress = {};
let quizState = {};
let moduleCompleted = false;
let MODULE_DATA = null;

// ==================== INITIALIZATION ====================
document.addEventListener('DOMContentLoaded', function() {
  console.log("DOM loaded, initializing module page...");
  
  // Check if Firebase is loaded
  if (typeof initializeFirebase !== 'function') {
    console.error("Firebase initialization function not found");
    showError("Firebase configuration error. Please check your setup.");
    return;
  }
  
  // Initialize Firebase
  initializeFirebase();
  
  // Wait for Firebase to be ready
  let attempts = 0;
  const maxAttempts = 30;
  
  const waitForFirebase = setInterval(() => {
    attempts++;
    
    if (window.FirebaseService && FirebaseService.isInitialized && FirebaseService.isInitialized()) {
      clearInterval(waitForFirebase);
      console.log("Firebase ready, loading module...");
      initModule();
    } else if (attempts >= maxAttempts) {
      clearInterval(waitForFirebase);
      console.error("Firebase initialization timeout");
      showError("Unable to connect to Firebase. Please check your internet connection and try again.");
    }
  }, 300);
});

async function initModule() {
  // Get module ID from URL - this is where moduleId is defined
  const urlParams = new URLSearchParams(window.location.search);
  const moduleId = urlParams.get("module");
  
  console.log("Loading module with ID:", moduleId);
  
  if (!moduleId) {
    showError("No module specified. Please select a module from the learning path.");
    return;
  }
  
  // Show loading state
  const container = document.getElementById('chapterContent');
  if (container) {
    container.innerHTML = `
      <div style="text-align: center; padding: 60px 20px;">
        <i class="fas fa-spinner fa-pulse" style="font-size: 48px; color: var(--accent2); margin-bottom: 20px;"></i>
        <h2>Loading Module...</h2>
        <p style="color: var(--muted);">Please wait while we load "${moduleId}" course content.</p>
      </div>
    `;
  }
  
  try {
    // Safety check — catches stale cached firebase-config.js
    if (typeof FirebaseService.getModule !== 'function') {
      showError('Firebase config is outdated. Please hard-reload the page (Ctrl+Shift+R) and try again.');
      console.error('FirebaseService.getModule is not a function — firebase-config.js is stale/cached.');
      return;
    }

    // Fetch module data
    const result = await FirebaseService.getModule(moduleId);
    
    if (!result.success || !result.data) {
      console.error("Module load error:", result.error);
      showError(`Module "${moduleId}" not found. Please make sure the module data is uploaded to Firebase.`);
      return;
    }
    
   MODULE_DATA = result.data;
console.log("Module loaded:", MODULE_DATA);  // log full data to inspect structure

// Validate required fields
if (!MODULE_DATA.chapters || !Array.isArray(MODULE_DATA.chapters)) {
  showError(`Module "${moduleId}" is missing chapters data. Please check your Firestore document structure.`);
  return;
}
    
    // Update page title
    document.title = `codenprofit — ${MODULE_DATA.title}`;
    
    // Update module badge
    const moduleBadge = document.querySelector(".module-badge");
    if (moduleBadge) {
      moduleBadge.innerHTML = `<i class="fas fa-code"></i> ${MODULE_DATA.title}`;
    }
    
    // Load saved progress
    loadSavedProgress();
    renderChapterList();
    loadChapter(0);
    updateProgressCircle();
    
    showToast(`✅ "${MODULE_DATA.title}" loaded successfully!`);
    
  } catch (error) {
    console.error("Error loading module:", error);
    showError(`Error loading module: ${error.message}`);
  }
}

function loadSavedProgress() {
  try {
    const saved = localStorage.getItem('cnp_module_' + (MODULE_DATA ? MODULE_DATA.id : 'unknown'));
    if (saved) {
      const data = JSON.parse(saved);
      chapterProgress = data.chapterProgress || {};
      quizState = data.quizState || {};
      moduleCompleted = data.completed || false;
      
      if (moduleCompleted) {
        showToast('✅ You\'ve already completed this module!');
      }
    } else {
      chapterProgress = {};
      quizState = {};
      moduleCompleted = false;
    }
  } catch (e) {
    console.error('Error loading progress:', e);
    chapterProgress = {};
    quizState = {};
  }
}

function saveProgress() {
  if (!MODULE_DATA) return;
  
  const data = {
    chapterProgress: chapterProgress,
    quizState: quizState,
    completed: moduleCompleted,
    lastUpdated: Date.now()
  };
  localStorage.setItem('cnp_module_' + MODULE_DATA.id, JSON.stringify(data));
}

function renderChapterList() {
  const container = document.getElementById('chapterList');
  if (!container || !MODULE_DATA) return;
  
  container.innerHTML = MODULE_DATA.chapters.map((chapter, index) => {
    const isCompleted = chapterProgress[chapter.id] === true;
    const isActive = index === currentChapterIndex;
    const status = isCompleted ? 'completed' : 'pending';
    
    return `
      <div class="chapter-item ${isActive ? 'active' : ''} ${isCompleted ? 'completed' : ''}" onclick="loadChapter(${index})">
        <div class="chapter-status ${status}">
          ${isCompleted ? '<i class="fas fa-check"></i>' : index + 1}
        </div>
        <div class="chapter-info">
          <div class="chapter-title">${escapeHtml(chapter.title)}</div>
          <div class="chapter-meta"><i class="far fa-clock"></i> ${chapter.duration}</div>
        </div>
      </div>
    `;
  }).join('');
}

function loadChapter(index) {
  if (!MODULE_DATA) return;
  if (index < 0 || index >= MODULE_DATA.chapters.length) return;
  
  if (index > 0 && !chapterProgress[MODULE_DATA.chapters[index - 1].id]) {
    showToast('⚠ Complete the previous chapter first!');
    return;
  }
  
  currentChapterIndex = index;
  renderChapterList();
  
  const chapter = MODULE_DATA.chapters[index];
  renderChapterContent(chapter);
  
  document.getElementById('chapterContent').scrollIntoView({ behavior: 'smooth' });
}

function renderChapterContent(chapter) {
  const container = document.getElementById('chapterContent');
  if (!container || !MODULE_DATA) return;
  
  const chapterNumber = currentChapterIndex + 1;
  const totalChapters = MODULE_DATA.chapters.length;
  const progress = ((currentChapterIndex) / (totalChapters - 1)) * 100;
  
  let sectionsHtml = '';
  
  if (chapter.content && chapter.content.sections) {
    chapter.content.sections.forEach(section => {
      if (section.type === 'text') {
        sectionsHtml += `<div class="content-section">${section.content}</div>`;
      } 
      else if (section.type === 'code') {
        sectionsHtml += `
          <div class="content-section">
            <div class="code-block">
              <div class="code-header">
                <span class="code-language">${section.language}</span>
                <button class="code-copy" onclick="copyCode(this)"><i class="far fa-copy"></i> Copy</button>
              </div>
              <pre><code class="language-${section.language}">${escapeHtml(section.code)}</code></pre>
            </div>
            ${section.explanation ? `<p class="content-text" style="margin-top: 12px;">${section.explanation}</p>` : ''}
          </div>
        `;
      }
      else if (section.type === 'list') {
        sectionsHtml += `
          <div class="content-section">
            <h3 class="section-subtitle">${section.title}</h3>
            <ul class="content-list">
              ${section.items.map(item => `<li>${item}</li>`).join('')}
            </ul>
          </div>
        `;
      }
      else if (section.type === 'table' && section.rows) {
        sectionsHtml += `
          <div class="content-section">
            <h3 class="section-subtitle">${section.title}</h3>
            <table class="content-table">
              <thead>
                <tr>${section.headers.map(h => `<th>${h}</th>`).join('')}</tr>
              </thead>
              <tbody>
                ${section.rows.map(row => ` <tr>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>`).join('')}
              </tbody>
            </table>
          </div>
        `;
      }
      else if (section.type === 'info') {
        sectionsHtml += `
          <div class="info-box">
            <div class="info-icon"><i class="fas fa-info-circle"></i></div>
            <div class="info-content">
              <h4>Did You Know?</h4>
              <p>${section.content}</p>
            </div>
          </div>
        `;
      }
      else if (section.type === 'tip') {
        sectionsHtml += `
          <div class="info-box tip-box">
            <div class="info-icon"><i class="fas fa-lightbulb"></i></div>
            <div class="info-content">
              <h4>Pro Tip</h4>
              <p>${section.content}</p>
            </div>
          </div>
        `;
      }
      else if (section.type === 'warning') {
        sectionsHtml += `
          <div class="info-box warning-box">
            <div class="info-icon"><i class="fas fa-exclamation-triangle"></i></div>
            <div class="info-content">
              <h4>Important</h4>
              <p>${section.content}</p>
            </div>
          </div>
        `;
      }
      else if (section.type === 'image') {
        sectionsHtml += `
          <div class="image-container">
            <img src="${section.url}" alt="Chapter illustration">
            ${section.caption ? `<div class="image-caption">${section.caption}</div>` : ''}
          </div>
        `;
      }
    });
  }
  
  if (!quizState[chapter.id]) {
    quizState[chapter.id] = {
      currentQuestion: 0,
      answers: {},
      completed: chapterProgress[chapter.id] || false,
      score: 0
    };
  }
  
  const isChapterCompleted = chapterProgress[chapter.id] === true;
  
  container.innerHTML = `
    <div class="chapter-header">
      <h1><i class="fas ${getChapterIcon(currentChapterIndex)}"></i> ${escapeHtml(chapter.title)}</h1>
      <div class="chapter-progress">
        <span>Chapter ${chapterNumber} of ${totalChapters}</span>
        <div class="chapter-progress-bar">
          <div class="chapter-progress-fill" style="width: ${progress}%"></div>
        </div>
      </div>
    </div>
    
    <div id="chapterSections">
      ${sectionsHtml}
    </div>
    
    ${!isChapterCompleted && chapter.content && chapter.content.quiz ? `
      <div class="quiz-section" id="quizSection">
        ${renderQuiz(chapter)}
      </div>
    ` : isChapterCompleted ? `
      <div class="quiz-section">
        <div style="text-align: center; padding: 20px;">
          <i class="fas fa-check-circle" style="font-size: 48px; color: var(--green); margin-bottom: 16px;"></i>
          <h3 style="margin-bottom: 8px;">Chapter Completed!</h3>
          <p style="color: var(--muted);">You've successfully completed this chapter.</p>
        </div>
      </div>
    ` : ''}
    
    <div class="chapter-nav">
      <button class="btn-secondary" onclick="previousChapter()" ${currentChapterIndex === 0 ? 'disabled' : ''}>
        <i class="fas fa-arrow-left"></i> Previous Chapter
      </button>
      <button class="btn-primary" onclick="nextChapter()" ${currentChapterIndex === totalChapters - 1 ? 'disabled' : ''}>
        Next Chapter <i class="fas fa-arrow-right"></i>
      </button>
    </div>
  `;
  
  if (typeof Prism !== 'undefined') {
    Prism.highlightAll();
  }
}

function renderQuiz(chapter) {
  const state = quizState[chapter.id];
  const quiz = chapter.content.quiz;
  
  if (!quiz || quiz.length === 0) {
    return `
      <div class="quiz-header">
        <div class="quiz-icon"><i class="fas fa-check-circle"></i></div>
        <div>
          <h3>No Quiz Available</h3>
          <p>Click "Mark Complete" to finish this chapter.</p>
        </div>
      </div>
      <button class="btn-primary" onclick="markChapterComplete()" style="margin-top: 20px; width: 100%;">
        <i class="fas fa-check-circle"></i> Mark Chapter as Complete
      </button>
    `;
  }
  
  if (state.completed) {
    const passed = state.score >= quiz.length * 0.7;
    
    return `
      <div class="quiz-header">
        <div class="quiz-icon"><i class="fas ${passed ? 'fa-trophy' : 'fa-redo-alt'}"></i></div>
        <div>
          <h3>Quiz ${passed ? 'Passed!' : 'Failed'}</h3>
          <p>You scored ${state.score}/${quiz.length}</p>
        </div>
      </div>
      
      <div style="text-align: center; padding: 20px;">
        ${passed ? `
          <p style="color: var(--muted); margin-bottom: 20px;">Great job! You can now proceed to the next chapter.</p>
          <button class="btn-primary" onclick="markChapterComplete()">
            <i class="fas fa-check-circle"></i> Mark Chapter as Complete
          </button>
        ` : `
          <p style="color: var(--muted); margin-bottom: 20px;">You need 70% to pass. Review the material and try again.</p>
          <button class="btn-secondary" onclick="resetChapterQuiz('${chapter.id}')">
            <i class="fas fa-redo-alt"></i> Try Quiz Again
          </button>
        `}
      </div>
    `;
  }
  
  const question = quiz[state.currentQuestion];
  const selected = state.answers[state.currentQuestion];
  const progress = ((state.currentQuestion) / quiz.length) * 100;
  
  return `
    <div class="quiz-header">
      <div class="quiz-icon"><i class="fas fa-question-circle"></i></div>
      <div>
        <h3>Chapter Quiz</h3>
        <p>Question ${state.currentQuestion + 1} of ${quiz.length}</p>
      </div>
    </div>
    
    <div style="height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-bottom: 24px;">
      <div style="width: ${progress}%; height: 100%; background: var(--grad); border-radius: 2px;"></div>
    </div>
    
    <div class="quiz-question">
      ${escapeHtml(question.question)}
    </div>
    
    <div class="quiz-options">
      ${question.options.map((opt, idx) => `
        <div class="quiz-option ${selected === idx ? 'selected' : ''}" 
             onclick="selectQuizOption('${chapter.id}', ${idx})">
          ${escapeHtml(opt)}
        </div>
      `).join('')}
    </div>
    
    <div class="quiz-actions">
      <button class="btn-primary" onclick="submitQuizAnswer('${chapter.id}')" ${selected === undefined ? 'disabled' : ''}>
        ${state.currentQuestion === quiz.length - 1 ? 'Finish Quiz' : 'Next Question'}
      </button>
    </div>
  `;
}

function selectQuizOption(chapterId, optionIndex) {
  const chapter = MODULE_DATA.chapters.find(c => c.id === chapterId);
  if (!chapter) return;
  
  const state = quizState[chapterId];
  if (!state || state.completed) return;
  
  state.answers[state.currentQuestion] = optionIndex;
  saveProgress();
  
  const quizSection = document.getElementById('quizSection');
  if (quizSection) {
    quizSection.innerHTML = renderQuiz(chapter);
  }
}

function submitQuizAnswer(chapterId) {
  const chapter = MODULE_DATA.chapters.find(c => c.id === chapterId);
  if (!chapter) return;
  
  const state = quizState[chapterId];
  if (!state || state.completed) return;
  
  const quiz = chapter.content.quiz;
  const selected = state.answers[state.currentQuestion];
  
  if (selected === undefined) return;
  
  if (selected === quiz[state.currentQuestion].correct) {
    state.score++;
  }
  
  if (state.currentQuestion < quiz.length - 1) {
    state.currentQuestion++;
  } else {
    state.completed = true;
  }
  
  saveProgress();
  
  const quizSection = document.getElementById('quizSection');
  if (quizSection) {
    quizSection.innerHTML = renderQuiz(chapter);
  }
}

function resetChapterQuiz(chapterId) {
  quizState[chapterId] = {
    currentQuestion: 0,
    answers: {},
    completed: false,
    score: 0
  };
  saveProgress();
  
  const chapter = MODULE_DATA.chapters.find(c => c.id === chapterId);
  if (chapter) {
    const quizSection = document.getElementById('quizSection');
    if (quizSection) {
      quizSection.innerHTML = renderQuiz(chapter);
    }
  }
}

function markChapterComplete() {
  const chapter = MODULE_DATA.chapters[currentChapterIndex];
  if (!chapter) return;
  
  chapterProgress[chapter.id] = true;
  saveProgress();
  
  showToast('✅ Chapter completed!');
  updateProgressCircle();
  
  const allChaptersCompleted = MODULE_DATA.chapters.every(ch => chapterProgress[ch.id] === true);
  
  if (allChaptersCompleted && !moduleCompleted && MODULE_DATA.finalQuiz) {
    openFinalQuiz();
  } else {
    loadChapter(currentChapterIndex);
  }
}

function updateProgressCircle() {
  if (!MODULE_DATA) return;
  
  const completedCount = Object.keys(chapterProgress).length;
  const totalChapters = MODULE_DATA.chapters.length;
  const percent = Math.round((completedCount / totalChapters) * 100);
  
  const circle = document.querySelector('.progress-circle-fill');
  const percentEl = document.getElementById('progressPercent');
  
  if (circle) {
    const circumference = 2 * Math.PI * 18;
    const offset = circumference - (percent / 100) * circumference;
    circle.style.strokeDashoffset = offset;
  }
  
  if (percentEl) {
    percentEl.textContent = percent + '%';
  }
}

function getChapterIcon(index) {
  const icons = ['fa-file-code', 'fa-tags', 'fa-keyboard', 'fa-paint-brush', 'fa-vector-square', 'fa-layer-group', 'fa-grid-2', 'fa-grid-2'];
  return icons[index % icons.length];
}

function escapeHtml(text) {
  if (!text) return '';
  return String(text)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function previousChapter() {
  if (currentChapterIndex > 0) {
    loadChapter(currentChapterIndex - 1);
  }
}

function nextChapter() {
  if (currentChapterIndex < MODULE_DATA.chapters.length - 1) {
    const currentChapter = MODULE_DATA.chapters[currentChapterIndex];
    if (!chapterProgress[currentChapter.id]) {
      showToast('⚠ Complete the current chapter first!');
      return;
    }
    loadChapter(currentChapterIndex + 1);
  }
}

function openFinalQuiz() {
  const modal = document.getElementById('finalQuizModal');
  if (!modal) return;
  
  if (!quizState.final) {
    quizState.final = {
      currentQuestion: 0,
      answers: {},
      completed: false,
      score: 0
    };
  }
  
  renderFinalQuiz();
  modal.classList.add('open');
}

function renderFinalQuiz() {
  const content = document.getElementById('finalQuizContent');
  const state = quizState.final;
  
  if (!MODULE_DATA.finalQuiz) {
    if (content) {
      content.innerHTML = `
        <h2><i class="fas fa-trophy"></i> Congratulations!</h2>
        <div style="text-align: center; padding: 20px;">
          <i class="fas fa-check-circle" style="font-size: 64px; color: var(--green); margin-bottom: 20px;"></i>
          <h3>All Chapters Completed!</h3>
          <p style="color: var(--muted); margin: 20px 0;">You've successfully completed all chapters of this module.</p>
          <button class="btn-primary" onclick="completeModule()">
            <i class="fas fa-check"></i> Complete Module
          </button>
        </div>
      `;
    }
    return;
  }
  
  if (state.completed) {
    const passed = state.score >= MODULE_DATA.finalQuiz.length * 0.7;
    
    if (passed && !moduleCompleted) {
      moduleCompleted = true;
      saveProgress();
      saveCompletionToFirestore();
      showToast(`🎉 ${MODULE_DATA.badge} earned!`);
    }
    
    if (content) {
      content.innerHTML = `
        <h2><i class="fas ${passed ? 'fa-trophy' : 'fa-redo-alt'}"></i> ${passed ? 'Congratulations!' : 'Keep Practicing!'}</h2>
        
        <div style="text-align: center; padding: 20px;">
          <div style="font-size: 48px; font-weight: 700; color: ${passed ? 'var(--green)' : 'var(--red)'}; margin-bottom: 16px;">
            ${state.score}/${MODULE_DATA.finalQuiz.length}
          </div>
          <p style="color: var(--muted); margin-bottom: 24px;">
            ${passed ? 'You passed the final assessment!' : 'You need 70% to pass. Review the material and try again.'}
          </p>
          
          ${passed ? `
            <div class="completion-badge">
              <i class="fas fa-certificate"></i>
              <h3>${MODULE_DATA.badge}</h3>
              <p>has been added to your profile</p>
            </div>
            <div style="display: flex; gap: 16px; justify-content: center; margin-top: 24px;">
              <button class="btn-secondary" onclick="closeFinalQuiz()">
                <i class="fas fa-times"></i> Close
              </button>
              <button class="btn-primary" onclick="returnToLearningPath()">
                <i class="fas fa-arrow-right"></i> Back to Learning Path
              </button>
            </div>
          ` : `
            <div style="display: flex; gap: 16px; justify-content: center;">
              <button class="btn-secondary" onclick="closeFinalQuiz()">
                <i class="fas fa-times"></i> Close
              </button>
              <button class="btn-primary" onclick="resetFinalQuiz()">
                <i class="fas fa-redo-alt"></i> Try Again
              </button>
            </div>
          `}
        </div>
      `;
    }
    return;
  }
  
  const question = MODULE_DATA.finalQuiz[state.currentQuestion];
  const selected = state.answers[state.currentQuestion];
  const progress = ((state.currentQuestion) / MODULE_DATA.finalQuiz.length) * 100;
  
  if (content) {
    content.innerHTML = `
      <h2><i class="fas fa-certificate"></i> Final Assessment</h2>
      
      <div style="height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin: 24px 0;">
        <div style="width: ${progress}%; height: 100%; background: var(--grad); border-radius: 2px;"></div>
      </div>
      
      <div style="margin-bottom: 16px; color: var(--muted);">
        Question ${state.currentQuestion + 1} of ${MODULE_DATA.finalQuiz.length}
      </div>
      
      <div class="quiz-question">
        ${escapeHtml(question.question)}
      </div>
      
      <div class="quiz-options">
        ${question.options.map((opt, idx) => `
          <div class="quiz-option ${selected === idx ? 'selected' : ''}" 
               onclick="selectFinalQuizOption(${idx})">
            ${escapeHtml(opt)}
          </div>
        `).join('')}
      </div>
      
      <div class="quiz-actions">
        <button class="btn-primary" onclick="submitFinalQuizAnswer()" ${selected === undefined ? 'disabled' : ''}>
          ${state.currentQuestion === MODULE_DATA.finalQuiz.length - 1 ? 'Finish Assessment' : 'Next Question'}
        </button>
      </div>
    `;
  }
}

function selectFinalQuizOption(optionIndex) {
  const state = quizState.final;
  if (!state || state.completed) return;
  
  state.answers[state.currentQuestion] = optionIndex;
  saveProgress();
  renderFinalQuiz();
}

function submitFinalQuizAnswer() {
  const state = quizState.final;
  if (!state || state.completed) return;
  
  const selected = state.answers[state.currentQuestion];
  if (selected === undefined) return;
  
  if (selected === MODULE_DATA.finalQuiz[state.currentQuestion].correct) {
    state.score++;
  }
  
  if (state.currentQuestion < MODULE_DATA.finalQuiz.length - 1) {
    state.currentQuestion++;
  } else {
    state.completed = true;
  }
  
  saveProgress();
  renderFinalQuiz();
}

function resetFinalQuiz() {
  quizState.final = {
    currentQuestion: 0,
    answers: {},
    completed: false,
    score: 0
  };
  saveProgress();
  renderFinalQuiz();
}

function closeFinalQuiz() {
  const modal = document.getElementById('finalQuizModal');
  if (modal) modal.classList.remove('open');
}

function completeModule() {
  moduleCompleted = true;
  saveProgress();
  saveCompletionToFirestore();
  showToast(`🎉 ${MODULE_DATA.badge} earned!`);
  closeFinalQuiz();
  // Redirect back after a short delay
  setTimeout(() => {
    returnToLearningPath();
  }, 1500);
}

// Save completion to Firestore so dev.html can read it
async function saveCompletionToFirestore() {
  try {
    if (typeof FirebaseService === 'undefined') return;
    const user = firebase.auth().currentUser;
    if (!user) {
      console.warn('No logged in user — completion not saved to Firestore');
      return;
    }
    const result = await FirebaseService.saveModuleCompletion(
      user.uid,
      MODULE_DATA.skill,
      MODULE_DATA.id,
      MODULE_DATA.badge
    );
    if (result.success) {
      console.log('✅ Module completion saved to Firestore');
    } else {
      console.error('❌ Failed to save completion:', result.error);
    }
  } catch (err) {
    console.error('Error saving completion to Firestore:', err);
  }
}

function returnToLearningPath() {
    // Adding a slight delay or force reload ensures dev.html fetches fresh Firestore data
    window.location.href = 'dev.html#learn';
    setTimeout(() => {
        window.location.reload(); 
    }, 100);
}

function copyCode(button) {
  const codeBlock = button.closest('.code-block').querySelector('code');
  const code = codeBlock.textContent || codeBlock.innerText;
  
  navigator.clipboard.writeText(code).then(() => {
    button.innerHTML = '<i class="fas fa-check"></i> Copied!';
    setTimeout(() => {
      button.innerHTML = '<i class="far fa-copy"></i> Copy';
    }, 2000);
  }).catch(err => {
    console.error('Failed to copy:', err);
    showToast('❌ Failed to copy code');
  });
}

function showToast(message) {
  const toast = document.getElementById('toast');
  if (toast) {
    toast.textContent = message;
    toast.style.display = 'block';
    
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => {
      toast.style.display = 'none';
    }, 3000);
  } else {
    alert(message);
  }
}

function showError(message) {
  const container = document.getElementById('chapterContent');
  if (container) {
    container.innerHTML = `
      <div style="text-align: center; padding: 60px 20px;">
        <i class="fas fa-exclamation-triangle" style="font-size: 64px; color: var(--red); margin-bottom: 20px;"></i>
        <h2>Error Loading Module</h2>
        <p style="color: var(--muted); margin: 20px 0;">${message}</p>
        <button class="btn-primary" onclick="window.location.href='dev.html#learn'">
          <i class="fas fa-arrow-left"></i> Back to Learning Path
        </button>
        <button class="btn-secondary" onclick="window.location.reload()" style="margin-left: 10px;">
          <i class="fas fa-sync-alt"></i> Retry
        </button>
      </div>
    `;
  }
}

// Make functions available globally
window.loadChapter = loadChapter;
window.selectQuizOption = selectQuizOption;
window.submitQuizAnswer = submitQuizAnswer;
window.resetChapterQuiz = resetChapterQuiz;
window.markChapterComplete = markChapterComplete;
window.previousChapter = previousChapter;
window.nextChapter = nextChapter;
window.copyCode = copyCode;
window.selectFinalQuizOption = selectFinalQuizOption;
window.submitFinalQuizAnswer = submitFinalQuizAnswer;
window.resetFinalQuiz = resetFinalQuiz;
window.closeFinalQuiz = closeFinalQuiz;
window.returnToLearningPath = returnToLearningPath;
window.completeModule = completeModule;
window.saveCompletionToFirestore = saveCompletionToFirestore;
  </script>
</body>
